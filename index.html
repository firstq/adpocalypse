<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      Third-party assets:
      - Icons: game-icons.net (CC BY 3.0) by Lorc, Delapouite, sbed, zeromancer
        License: https://creativecommons.org/licenses/by/3.0/
      - Sounds: Kenney.nl (CC0)
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adpocalypse</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        display: block;
        outline: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <!-- Yandex Games SDK — served by the platform when hosted there; 404s on localhost (expected). -->
    <script src="/sdk.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
